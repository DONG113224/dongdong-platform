name: Deploy Firebase Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase Functions
        uses: w9jds/firebase-action@v13.30.1
        with:
          args: deploy --only functions --project dongdong-platform-v2 --non-interactive
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
